# Render Blueprint for Backend Deployment Only
# Frontend is deployed separately on Vercel

services:
  - type: web
    name: krushisahayak-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 30d
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
